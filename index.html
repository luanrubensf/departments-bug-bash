<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments Bug Bash</title>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-green: #39FF14;
            --neon-pink: #FF10F0;
            --neon-cyan: #00F0FF;
            --neon-yellow: #FFF000;
            --deep-purple: #1a0a2e;
            --dark-purple: #2d1b4e;
        }

        body {
            font-family: 'Space Mono', monospace;
            background: linear-gradient(135deg, var(--deep-purple) 0%, var(--dark-purple) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated grid background */
        .grid-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% {
                transform: perspective(500px) rotateX(60deg) translateY(0);
            }
            100% {
                transform: perspective(500px) rotateX(60deg) translateY(50px);
            }
        }

        /* Floating bugs */
        .bug {
            position: absolute;
            font-size: 2rem;
            animation: float 6s ease-in-out infinite;
            opacity: 0.4;
            z-index: 1;
        }

        .bug:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
        .bug:nth-child(2) { left: 80%; top: 30%; animation-delay: 1s; }
        .bug:nth-child(3) { left: 15%; top: 70%; animation-delay: 2s; }
        .bug:nth-child(4) { left: 85%; top: 65%; animation-delay: 3s; }
        .bug:nth-child(5) { left: 50%; top: 10%; animation-delay: 4s; }
        .bug:nth-child(6) { left: 25%; top: 85%; animation-delay: 5s; }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            25% {
                transform: translateY(-20px) rotate(5deg);
            }
            50% {
                transform: translateY(0) rotate(0deg);
            }
            75% {
                transform: translateY(-15px) rotate(-5deg);
            }
        }

        .container {
            text-align: center;
            z-index: 10;
            position: relative;
            padding: 3rem;
            animation: slideIn 1s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .badge {
            display: inline-block;
            background: var(--neon-pink);
            color: var(--deep-purple);
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            font-weight: 700;
            font-size: 0.875rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2rem;
            box-shadow: 0 0 20px rgba(255, 16, 240, 0.6);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 20px rgba(255, 16, 240, 0.6);
            }
            50% {
                box-shadow: 0 0 40px rgba(255, 16, 240, 0.9);
            }
        }

        h1 {
            font-family: 'Dela Gothic One', cursive;
            font-size: clamp(3rem, 10vw, 7rem);
            line-height: 1.1;
            margin-bottom: 1.5rem;
            animation: glitch 5s infinite;
        }

        .title-line-1 {
            color: var(--neon-cyan);
            text-shadow: 
                0 0 10px var(--neon-cyan),
                0 0 20px var(--neon-cyan),
                0 0 40px var(--neon-cyan);
            display: block;
            animation-delay: 0.1s;
        }

        .title-line-2 {
            color: var(--neon-green);
            text-shadow: 
                0 0 10px var(--neon-green),
                0 0 20px var(--neon-green),
                0 0 40px var(--neon-green);
            display: block;
            animation-delay: 0.2s;
        }

        @keyframes glitch {
            0%, 90%, 100% {
                transform: translate(0);
            }
            92% {
                transform: translate(-2px, 2px);
            }
            94% {
                transform: translate(2px, -2px);
            }
            96% {
                transform: translate(-2px, -2px);
            }
        }

        .subtitle {
            font-size: 1.5rem;
            color: var(--neon-yellow);
            text-shadow: 0 0 10px var(--neon-yellow);
            margin-bottom: 3rem;
            letter-spacing: 2px;
            animation: fadeIn 1s ease-out 0.5s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            max-width: 1000px;
            margin: 0 auto 3rem;
            animation: fadeIn 1s ease-out 0.8s both;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .info-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--neon-cyan);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 240, 255, 0.3);
        }

        .info-card.clickable {
            cursor: pointer;
        }

        .info-card.clickable:hover {
            border-color: var(--neon-green);
            box-shadow: 0 10px 30px rgba(57, 255, 20, 0.4);
        }

        .info-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .info-title {
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-detail {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
        }

        .cta-section {
            margin-top: 3rem;
            animation: fadeIn 1s ease-out 1.1s both;
        }

        .cta-text {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            opacity: 0.9;
        }

        .cta-link {
            display: inline-block;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-cyan));
            color: white;
            padding: 1rem 3rem;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 16, 240, 0.4);
        }

        .cta-link:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 16, 240, 0.6);
        }

        /* Scanlines effect */
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 100;
            opacity: 0.3;
        }

        @media (max-width: 768px) {
            .container {
                padding: 2rem 1rem;
            }

            .info-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            h1 {
                font-size: 2.5rem;
            }

            .subtitle {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="grid-background"></div>
    <div class="scanlines"></div>
    
    <!-- Floating bugs -->
    <div class="bug">🐛</div>
    <div class="bug">🐞</div>
    <div class="bug">🦗</div>
    <div class="bug">🐛</div>
    <div class="bug">🐞</div>
    <div class="bug">🦗</div>

    <div class="container">
        <div class="badge">🎯 Team Bug Hunt</div>
        
        <h1>
            <span class="title-line-1">DEPARTMENTS</span>
            <span class="title-line-2">BUG BASH</span>
        </h1>

        <div class="subtitle">🚀 Time to Hunt Some Bugs! 🎮</div>

        <div class="info-grid">
            <a href="https://dev.sandbox.maple.com/" target="_blank" class="info-card clickable">
                <div class="info-icon">🌐</div>
                <div class="info-title">Environment</div>
                <div class="info-detail">dev.sandbox.maple.com</div>
            </a>

            <div class="info-card">
                <div class="info-icon">🎯</div>
                <div class="info-title">Mission</div>
                <div class="info-detail">Test Department Features</div>
            </div>

            <a href="squad.html" class="info-card clickable">
                <div class="info-icon">👥</div>
                <div class="info-title">Squad</div>
                <div class="info-detail">João, Luan, Rafael, Rocky</div>
            </a>
        </div>

        <div class="cta-section">
            <div class="cta-text">Ready to squash some bugs? 🔨</div>
            <a href="instructions.html" class="cta-link">Let's Go! 🐛💥</a>
        </div>
    </div>

    <script>
        // Add some interactive sparkle on mouse move
        document.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.95) {
                const sparkle = document.createElement('div');
                sparkle.innerHTML = '✨';
                sparkle.style.position = 'fixed';
                sparkle.style.left = e.clientX + 'px';
                sparkle.style.top = e.clientY + 'px';
                sparkle.style.pointerEvents = 'none';
                sparkle.style.fontSize = '1rem';
                sparkle.style.animation = 'sparkle 1s ease-out forwards';
                sparkle.style.zIndex = '1000';
                
                document.body.appendChild(sparkle);
                
                setTimeout(() => sparkle.remove(), 1000);
            }
        });

        const style = document.createElement('style');
        style.textContent = `
            @keyframes sparkle {
                0% {
                    opacity: 1;
                    transform: translateY(0) scale(0);
                }
                50% {
                    opacity: 1;
                    transform: translateY(-20px) scale(1);
                }
                100% {
                    opacity: 0;
                    transform: translateY(-40px) scale(0);
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
